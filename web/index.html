<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>ArtDeck</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,500;12..96,700;12..96,800&family=Hanken+Grotesk:wght@400;500;600;700&family=Spline+Sans+Mono:wght@500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="grain" aria-hidden="true"></div>
<div class="aura" aria-hidden="true"><span class="aura-a"></span><span class="aura-b"></span><span class="aura-c"></span></div>

<header class="topbar">
  <div class="brand">
    <span class="word">Art<em>Deck</em></span>
    <span class="tag" data-i18n="tagline"></span>
  </div>

  <div class="controls">
    <button id="btn-autofill" class="btn primary">
      <span data-i18n="autofill"></span>
    </button>
    <button id="btn-clean" class="btn ghost">
      <span data-i18n="clean"></span>
    </button>

    <span class="ctl-div"></span>

    <button id="btn-key" class="btn keybtn bad hidden">
      <span class="key-dot"></span>
      <span id="key-label"></span>
    </button>

    <div id="settings" class="settings">
      <button id="btn-settings" class="btn ghost gear" aria-haspopup="menu" aria-expanded="false" aria-label="Settings">
        <svg class="ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9.671 4.136a2.34 2.34 0 0 1 4.659 0 2.34 2.34 0 0 0 3.319 1.915 2.34 2.34 0 0 1 2.33 4.033 2.34 2.34 0 0 0 0 3.831 2.34 2.34 0 0 1-2.33 4.033 2.34 2.34 0 0 0-3.319 1.915 2.34 2.34 0 0 1-4.659 0 2.34 2.34 0 0 0-3.32-1.915 2.34 2.34 0 0 1-2.33-4.033 2.34 2.34 0 0 0 0-3.831A2.34 2.34 0 0 1 6.35 6.051a2.34 2.34 0 0 0 3.319-1.915"/><circle cx="12" cy="12" r="3"/></svg>
        <span class="gear-dot" id="gear-dot"></span>
      </button>
      <div id="settings-menu" class="settings-menu hidden" role="menu">
        <button id="set-key" class="set-row" role="menuitem" type="button">
          <svg class="set-ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M2.586 17.414A2 2 0 0 0 2 18.828V21a1 1 0 0 0 1 1h3a1 1 0 0 0 1-1v-1a1 1 0 0 1 1-1h1a1 1 0 0 0 1-1v-1a1 1 0 0 1 1-1h.172a2 2 0 0 0 1.414-.586l.814-.814a6.5 6.5 0 1 0-4-4z"/><circle cx="16.5" cy="7.5" r=".5" fill="currentColor"/></svg>
          <span class="set-meta"><b data-i18n="key_btn"></b><small id="set-key-status"></small></span>
          <span class="set-dot" id="set-key-dot"></span>
        </button>
        <button id="set-lang" class="set-row" role="menuitem" type="button">
          <svg class="set-ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m5 8 6 6"/><path d="m4 14 6-6 2-3"/><path d="M2 5h12"/><path d="M7 2h1"/><path d="m22 22-5-10-5 10"/><path d="M14 18h6"/></svg>
          <span class="set-meta"><b data-i18n="lang_title"></b><small id="set-lang-cur"></small></span>
        </button>
      </div>
    </div>

    <span class="ctl-div"></span>

    <div id="acct" class="acct">
      <button id="acct-btn" class="acct-btn" aria-haspopup="listbox" aria-expanded="false">
        <span id="acct-av" class="acct-av"></span>
        <span class="acct-meta">
          <span class="acct-lbl" data-i18n="account"></span>
          <span id="acct-name" class="acct-name">···</span>
        </span>
        <svg class="chev" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="m6 9 6 6 6-6"/></svg>
      </button>
      <div id="acct-menu" class="acct-menu hidden" role="listbox"></div>
    </div>
  </div>
</header>

<main>
  <aside class="sidebar">
    <div class="src-tabs" id="src-tabs">
      <button class="src-tab active" data-src="shortcut"><span data-i18n="tab_nonsteam"></span></button>
      <button class="src-tab" data-src="installed"><span data-i18n="tab_installed"></span></button>
      <span class="src-ink" id="src-ink"></span>
    </div>
    <div class="filter">
      <svg class="ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="7"/><path d="m21 21-4.3-4.3"/></svg>
      <input id="filter" type="text" autocomplete="off">
      <button id="btn-refresh" class="refresh-btn">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12a9 9 0 1 1-2.64-6.36"/><path d="M21 4v5h-5"/></svg>
      </button>
    </div>
    <div id="games" class="game-list"></div>
  </aside>

  <section class="content">
    <div class="match">
      <div class="match-info">
        <div class="match-name" id="match-name"></div>
        <div class="match-sub" id="match-sub"></div>
      </div>
      <div class="match-search">
        <svg class="ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="7"/><path d="m21 21-4.3-4.3"/></svg>
        <input id="search" type="text" autocomplete="off">
        <div id="candidates" class="cand hidden"></div>
      </div>
    </div>

    <div class="toolbar">
      <div id="tabs" class="type-tabs"></div>
      <label class="anim-toggle" id="anim-wrap">
        <input type="checkbox" id="anim">
        <span class="sw"></span>
        <span class="anim-lbl" data-i18n="only_animated"></span>
      </label>
    </div>

    <div id="grid" class="art-grid"></div>
    <div id="empty" class="empty hidden" data-i18n="pick_to_see"></div>
  </section>
</main>

<footer class="footnote"><span data-i18n="disclaimer"></span></footer>

<div id="toasts" class="toasts"></div>

<!-- preview lightbox -->
<div id="light" class="light hidden">
  <button id="light-x" class="light-x" aria-label="close">✕</button>
  <div class="light-card" id="light-card">
    <div class="light-stage" id="light-stage"></div>
    <div class="light-foot">
      <div class="light-meta" id="light-meta"></div>
      <button class="btn primary" id="light-apply"></button>
    </div>
  </div>
</div>

<!-- auto-fill progress -->
<div id="overlay" class="overlay hidden">
  <div class="sheet">
    <div class="spinner"></div>
    <div class="sheet-title" data-i18n="autofill"></div>
    <div class="sheet-game" id="ov-game"></div>
    <div class="bar"><div class="bar-fill" id="bar-fill"></div></div>
    <div class="sheet-count" id="ov-count"></div>
  </div>
</div>

<!-- modal -->
<div id="modal" class="overlay hidden">
  <div class="sheet modal-card">
    <div class="modal-title" id="modal-title"></div>
    <div class="modal-body" id="modal-body"></div>
    <div class="modal-actions" id="modal-actions"></div>
  </div>
</div>

<script src="i18n.js"></script>
<script src="app.js"></script>
</body>
</html>
